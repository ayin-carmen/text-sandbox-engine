name: Phase 8 Desktop Bundle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "editor/**"
      - "src-tauri/**"
      - "src/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/phase8-desktop.yml"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packaging dependencies
        run: python -m pip install -e ".[editor,packaging]"

      - name: Build packaged local API
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/editor-runtime | Out-Null
          python -m PyInstaller --noconfirm --clean --onefile `
            --name text-sandbox-editor-api `
            --paths src `
            --distpath build/editor-runtime `
            --workpath build/editor-runtime-spec `
            --specpath build/editor-runtime-spec `
            scripts/editor_api_entry.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editor/package-lock.json

      - name: Install and build editor
        working-directory: editor
        run: |
          npm ci
          npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Tauri installer
        working-directory: editor
        run: npx tauri build --config ../src-tauri/tauri.conf.json

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: text-sandbox-editor-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
